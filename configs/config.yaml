
data:
  events_dir: "data/validation/events"
  input_dir: "data/validation/input"
  target_dir: "data/validation/target"
model:
  num_bins: 5
  height: 512
  width: 512
  base_channels: 64
  encoder_channels: 16
  rfb_blocks: 3
event_sim:
  Cp: 0.1
  Cn: 0.1
  refractory_period: 10
  sigma_threshold: 0.03
  cutoff_hz: 0
  shot_noise_rate_hz: 2
  max_frames: 20
  pause_probability: 0
  rotational_offset: 0.05
  translational_offset: 0.35
  max_optical_flow: 2.0
  max_interp_frames: 20
training: 
  save_dir: "model_output"
  epochs: 100
  batch_size: 16
  learning_rate: 0.0002
  learning_rate_reduction: 0.75
  learning_rate_step_size: 10
  lpips_net: 'vgg'
  num_workers: 2
  num_saves: 10
  

